<!doctype html>
<html lang="en">
{% include head.html %}
<body>
  {% include header.html %}
  <main class="site-main">
    <article class="post">
      <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">
          <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
          {% if page.tags and page.tags.size > 0 %}
            · {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% unless forloop.last %}, {% endunless %}{% endfor %}
          {% endif %}
        </p>
      </header>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </main>
  {% include footer.html %}
</body>
</html>
