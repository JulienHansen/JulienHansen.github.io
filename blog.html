---
layout: default
title: Blog
permalink: /blog/
---

<section class="intro">
  <h1>Blog</h1>
  <p class="lead">Notes on papers, proofs, and whatever else I'm thinking about.</p>
</section>

<ul class="post-list">
  {% for post in site.posts %}
    <li>
      <a class="post-link" href="{{ post.url | relative_url }}">{{ post.title }}</a>
      <span class="post-date"><time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %-d, %Y" }}</time></span>
    </li>
  {% endfor %}
</ul>
